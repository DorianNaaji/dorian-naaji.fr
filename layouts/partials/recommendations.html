{{ $recs := .Params.recommendations }}
<section class="testimonials">
  <div class="container">

    <div class="testimonials__intro" data-animate>
      <div class="section-label">Recommandations LinkedIn</div>
      <h2 class="section-heading">{{ $recs.heading }}</h2>
    </div>

    <div class="testimonials__grid" data-animate-stagger>
      {{ range $recs.items }}
      <article class="testimonial-card">
        <div class="testimonial-card__quote-mark">
          <svg width="28" height="22" viewBox="0 0 28 22" fill="none" aria-hidden="true">
            <path d="M0 22V13.4C0 9.8 0.933333 6.73333 2.8 4.2C4.66667 1.6 7.4 0.133333 11 0L12.6 2.4C10.2 2.93333 8.4 4.06667 7.2 5.8C6.06667 7.46667 5.53333 9.26667 5.6 11.2H11V22H0ZM16 22V13.4C16 9.8 16.9333 6.73333 18.8 4.2C20.6667 1.6 23.4 0.133333 27 0L28.6 2.4C26.2 2.93333 24.4 4.06667 23.2 5.8C22.0667 7.46667 21.5333 9.26667 21.6 11.2H27V22H16Z" fill="currentColor"/>
          </svg>
        </div>

        <p class="testimonial-card__text">{{ .quote | markdownify }}</p>

        <div class="testimonial-card__footer">
          <img
            src="/img/{{ .avatar }}"
            alt="{{ .name }}"
            class="testimonial-card__avatar"
            loading="lazy"
          >
          <div class="testimonial-card__meta">
            <span class="testimonial-card__name">{{ .name }}</span>
            <span class="testimonial-card__title">{{ .title }}</span>
            <span class="testimonial-card__date">{{ .date }} · {{ .relation }}</span>
          </div>
          <a
            href="{{ .linkedin }}"
            class="testimonial-card__linkedin"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Voir sur LinkedIn"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
        </div>
      </article>
      {{ end }}
    </div>

  </div>
</section>
